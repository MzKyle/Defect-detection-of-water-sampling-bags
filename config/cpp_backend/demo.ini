[service]
auto_start = true
run_for_ms = 0

[logging]
level = info
console = true
file = artifacts/cpp_backend/service.log

[storage]
result_jsonl = artifacts/cpp_backend/results.jsonl
async_result_writes = true
result_queue_capacity = 512
drop_results_when_full = true

[detector.presence]
backend = mock
# backend = onnxruntime_cuda
# model_path = artifacts/models/presence.onnx
# use_cuda = true
# cuda_device_id = 0
# imgsz = 640
# nms_iou_threshold = 0.45

[detector.primary]
backend = mock
# backend = onnxruntime_cuda
# model_path = artifacts/models/primary.onnx
# use_cuda = true
# cuda_device_id = 0
# imgsz = 640
# nms_iou_threshold = 0.45

[detector.patch]
backend = mock
# backend = onnxruntime_cuda
# model_path = artifacts/models/patch.onnx
# use_cuda = true
# cuda_device_id = 0
# imgsz = 640
# nms_iou_threshold = 0.45

[camera.1]
id = 1
name = A-camera
watch_dir = demo_data/camera1

[camera.2]
id = 2
name = B-camera
watch_dir = demo_data/camera2

[runtime]
poll_interval_ms = 100
file_stable_ms = 300
file_ready_timeout_ms = 5000
cooldown_ms = 300
queue_capacity = 256
defect_worker_count = 4
expected_burst_images_per_camera = 3
bag_capture_timeout_ms = 1500
sort_result_timeout_ms = 1500

[detection]
presence_enabled = true
advance_on_presence = true
# 0 means every camera station controls its own upper/lower lever pair.
advance_trigger_camera_id = 0
presence_conf_threshold = 0.50
patch_enabled = true
patch_horizontal = 4
patch_vertical = 5
primary_conf_threshold = 0.30
patch_conf_threshold = 0.20

[correlation]
enabled = true
expected_camera_ids = 1,2
hold_non_defect_until_complete = true
pending_timeout_ms = 1500
timeout_action = reject
finalized_retention_ms = 5000

[plc]
enabled = true
ack_timeout_ms = 200
max_retries = 1
retry_interval_ms = 50
mock_fail_first_attempts = 0
mock_ack_latency_ms = 0
