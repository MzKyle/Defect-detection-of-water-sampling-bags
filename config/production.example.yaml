app:
  name: Waterbag Inspection Production
  host: 0.0.0.0
  port: 5000
  auto_start: true
  open_browser: false
  browser_url: http://127.0.0.1:5000

cameras:
  - id: 1
    name: A面相机
    watch_dir: D:/MVS/data/MV-CU120-10UC (DA5594458)
  - id: 2
    name: B面相机
    watch_dir: D:/MVS/data/MV-CU120-10UC (DA4792752)

models:
  primary:
    # Multi-light feature-fusion model. The model receives one grouped sample:
    # [B, 3, 3, H, W] by default, or [B, 9, H, W] when input_format is bchw.
    backend: multilight_torch
    weights_path: artifacts/models/multilight_yolo_feature_fusion.torchscript.pt
    encrypted_path:
    key_path:
    device: 0
    imgsz: 640
    conf_thres: 0.3
    iou_thres: 0.3
    light_order: [backlight, darkfield, polarized]
    primary_light: backlight
    input_format: blchw
    output_format: auto
    output_normalized: false
    class_names: [anomaly]
  patch:
    # Patch detector is kept for single-image fallback. Multi-light grouped samples
    # skip Stage 2 because the primary feature-fusion model already sees all lights.
    backend: ultralytics
    weights_path: artifacts/models/yolo11_patch_best.pt
    device: 0
    imgsz: 640
    conf_thres: 0.2
    iou_thres: 0.3

multilight:
  enabled: true
  light_order: [backlight, darkfield, polarized]
  primary_light: backlight
  manifest_suffixes: [".json", ".manifest"]

patch_detection:
  enabled: true
  horizontal: 4
  vertical: 5
  conf_thres: 0.2
  iou_thres: 0.3
  save_visualizations: true
  visualization_dir: artifacts/patch_vis

storage:
  backend: sqlite
  sqlite_path: artifacts/inspection.db

plc:
  backend: modbus
  enabled: true
  port: COM4
  baudrate: 115200
  parity: N
  stopbits: 1
  bytesize: 8
  timeout: 0.1
  registers:
    cam1: 100
    cam2: 102
    alert: 104
    bag: 106
  alert_pulse_seconds: 0.2
  ack_timeout_ms: 150
  max_retries: 2
  retry_interval_ms: 50
  mock_ack_latency_ms: 0
  mock_fail_first_attempts: 0

correlation:
  enabled: true
  expected_camera_ids: [1, 2]
  hold_non_defect_until_complete: true
  pending_timeout_ms: 800
  timeout_action: reject
  finalized_retention_ms: 5000

repeat_detection:
  enabled: true
  history_path: artifacts/repeat_history.json
  history_namespace: prod_line_a
  isolate_by_source: true
  iou_threshold: 0.5
  max_entries_per_camera: 100

runtime:
  backup_dir: artifacts/backups
  result_dir: artifacts/results
  upload_dir: artifacts/uploads
  cooldown_seconds: 1.0
  file_ready_timeout_seconds: 5.0
  file_stable_seconds: 0.3
  queue_poll_interval_seconds: 0.2
