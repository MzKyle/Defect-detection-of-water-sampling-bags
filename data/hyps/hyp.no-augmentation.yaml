# 训练超参数
lr0: 0.001  # 初始学习率
lrf: 0.01   # 最终学习率
momentum: 0.95  # SGD 动量/Adam beta1
weight_decay: 0.0001  # 优化器权重衰减
warmup_epochs: 5.0  # 预热轮数
warmup_momentum: 0.8  # 预热初始动量
warmup_bias_lr: 0.1  # 预热初始 bias 学习率

# 损失函数权重
box: 0.1  # 边界框损失权重
cls: 0.8  # 分类损失权重
cls_pw: 1.0  # 分类损失 BCELoss 正权重
obj: 1.0  # 目标损失权重
obj_pw: 1.0  # 目标损失 BCELoss 正权重
iou_t: 0.25  # IoU 训练阈值
anchor_t: 3.10  # anchor-倍数阈值

# Focal Loss 超参数
fl_gamma: 2.0  # Focal Loss gamma

# 数据增强
hsv_h: 0.015  # 图像 HSV 色调增强
hsv_s: 0.7    # HSV 饱和度增强
hsv_v: 0.4    # HSV 亮度增强
degrees: 5.0  # 旋转
translate: 0.1  # 平移
scale: 0.5    # 缩放
shear: 2.0    # 剪切
perspective: 0.0005  # 透视
flipud: 0.2   # 垂直翻转
fliplr: 0.5   # 水平翻转
mosaic: 1.0   # Mosaic 数据增强
mixup: 0.5    # MixUp 数据增强
copy_paste: 0.0  # 禁用 copy-paste 增强