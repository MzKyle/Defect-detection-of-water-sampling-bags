<!DOCTYPE html>
<html>
<head>
    <title>水质采样袋瑕疵检测系统</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 20px auto;
            max-width: 1280px;
            padding: 0 20px;
        }
        
        .image-box {
            flex: 1;
            min-width: 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 1040px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .image-box h3 {
            margin: 0 0 15px 0;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 24px;
            color: #333;
        }
        
        .image-box img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .image-box input[type="file"] {
            display: none;
        }
        
        .image-box label {
            cursor: pointer;
            text-align: center;
            font-size: 40px;
        }
        
        .image-box .status-box {
            margin-top: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 60px;
            color: #666;
        }
        
        .image-box .status-box.normal {
            background: #4df234;
            color: #000;
        }
        
        .image-box .status-box.alert {
            background: #ffcccc;
            color: #c00;
        }

        .final-result {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            padding: 20px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            font-size: 32px;
        }

        .final-result .title {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        .final-result .result {
            font-size: 48px;
            font-weight: bold;
            padding: 15px;
            border-radius: 4px;
        }

        .final-result .normal {
            background: #4df234;
            color: #000;
        }

        .final-result .alert {
            background: #ffcccc;
            color: #c00;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 0 10px;
            }
            
            .image-box {
                width: 100%;
                height: 400px;
                margin-bottom: 20px;
            }

            .final-result {
                position: static;
                width: 90%;
                margin: 20px auto;
                transform: none;
            }
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; font-size: 46px;">水样采集袋瑕疵AI视觉检测系统</h1>
    <div class="container">
        <div class="image-box">
            <label for="upload_front" class="front">选择正面文件</label>
            <input type="file" id="upload_front" accept="image/*">
            <div id="loading_front"></div>
            <div id="result_front" class="status-box"></div>
            <div id="status_front" class="normal"></div>
        </div>
        <div class="image-box">
            <label for="upload_back" class="back">选择反面文件</label>
            <input type="file" id="upload_back" accept="image/*">
            <div id="loading_back"></div>
            <div id="result_back" class="status-box"></div>
            <div id="status_back" class="normal"></div>
        </div>
    </div>

    <div class="final-result">
        <div class="title">最终检测结果</div>
        <div id="final_status" class="result">等待检测</div>
    </div>

    <script>
        let frontStatus = null;
        let backStatus = null;

        function updateFinalResult() {
            const finalStatusDiv = document.getElementById('final_status');
            
            if (frontStatus === null || backStatus === null) {
                finalStatusDiv.textContent = '等待检测';
                finalStatusDiv.className = 'result';
                return;
            }

            const isNormal = frontStatus === '正常' && backStatus === '正常';
            finalStatusDiv.textContent = isNormal ? '正常' : '异常';
            finalStatusDiv.className = `result ${isNormal ? 'normal' : 'alert'}`;
        }

        function handleDetect(input, side) {
            const formData = new FormData();
            formData.append('image', input.files[0]);
            formData.append('side', side); // 添加side参数
            
            fetch('/detect', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    alert('错误: ' + data.error);
                    return;
                }
                if(side === 'front'){
                    document.getElementById('result_front').innerHTML = 
                        `<img src="data:image/jpeg;base64,${data.result}" alt="检测结果" style="max-width:640px;">`;
                    const statusDiv = document.getElementById('status_front');
                    statusDiv.className = `status-box ${data.status_class}`;
                    statusDiv.innerHTML = `检测结果：${data.status}`;
                    frontStatus = data.status;
                } else {
                    document.getElementById('result_back').innerHTML = 
                        `<img src="data:image/jpeg;base64,${data.result}" alt="检测结果" style="max-width:640px;">`;
                    const statusDiv = document.getElementById('status_back');
                    statusDiv.className = `status-box ${data.status_class}`;
                    statusDiv.innerHTML = `检测结果：${data.status}`;
                    backStatus = data.status;
                }
                updateFinalResult();
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }

        document.getElementById('upload_front').addEventListener('change', function(e) {
            handleDetect(e.target, 'front');
        });

        document.getElementById('upload_back').addEventListener('change', function(e) {
            handleDetect(e.target, 'back');
        });
    </script>
</body>
</html>
