<!DOCTYPE html>
<html>
<head>
    <title>水质采样袋瑕疵检测</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px auto;
            max-width: 1280px;
            padding: 0 20px;
        }
        
        .image-box {
            flex: 1;
            min-width: 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 640px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .image-box h3 {
            margin: 0 0 15px 0;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 18px;
            color: #333;
        }
        
        .image-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f8f9fa;
            border-radius: 4px;
        }
        
        #original, #result img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        #original {
            cursor: zoom-in;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 0 10px;
            }
            
            .image-box {
                width: 100%;
                height: 400px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">水质采样袋瑕疵检测系统</h1>
    <div style="text-align: center;">
        <input type="file" id="upload" accept="image/*">
        <div id="loading">检测中...</div>
    </div>
    
    <div class="status-box" id="statusDisplay"></div>
    
    <div class="container">
        <div class="image-box">
            <h3>原始图片</h3>
            <img id="original" src="#" alt="原始图片" style="display: none;">
        </div>
        <div class="image-box">
            <h3>检测结果</h3>
            <div id="result"></div>
        </div>
    </div>

    <script>
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            // 显示加载状态
            document.getElementById('loading').style.display = 'block';
            document.getElementById('statusDisplay').innerHTML = '';
            
            // 显示原始图片
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('original').src = e.target.result;
                document.getElementById('original').style.display = 'block';
            }
            reader.readAsDataURL(file);

            // 发送请求
            fetch('/detect', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.error) {
                    alert('错误: ' + data.error);
                    return;
                }
                
                // 显示检测结果
                document.getElementById('result').innerHTML = 
                    `<img src="data:image/jpeg;base64,${data.result}" 
                         alt="检测结果" 
                         style="max-width:640px;">`;
                
                // 显示检测状态
                const statusDiv = document.getElementById('statusDisplay');
                statusDiv.className = `status-box ${data.status_class}`;
                statusDiv.innerHTML = `检测结果：${data.status}`;
                
                document.getElementById('loading').style.display = 'none';
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
            });
        });
    </script>
</body>
</html>
