name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile sources
        run: python -m compileall app.py waterbag_inspection tests

      - name: Run unit tests
        run: python -m pytest -q tests

      - name: Smoke test demo CLI
        run: |
          python -m waterbag_inspection seed-demo --output-root demo_data --clean
          python -m waterbag_inspection replay --config configs/demo.yaml --source-root demo_data --limit 3 --reset-history
